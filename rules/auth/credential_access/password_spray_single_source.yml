# Sigma correlation rule (multi-document): base rule selects failed
# authentications; the correlation fires when ONE source IP fails against many
# DISTINCT accounts in a window — the defining shape of a password spray
# (low-and-slow per account, loud across accounts).
title: '[Auth] - Failed Authentication (Spray Base)'
id: 9e1c7a5b-3d2f-4b8e-a6c1-4f0d9b2e6a8c
status: experimental
description: |
    Base selector for failed authentications, consumed by the password-spray
    correlation. Not intended to alert on its own.
references:
    - https://attack.mitre.org/techniques/T1110/003/
author: dlpz-SEC
date: 2026/07/13
tags:
    - attack.credential_access
    - attack.t1110
    - attack.t1110.003
logsource:
    category: authentication
    product: windows
detection:
    selection:
        outcome: 'failure'
    condition: selection
falsepositives:
    - A misconfigured application retrying many service accounts from one host.
    - A shared NAT/VPN egress aggregating many users' fat-finger failures.
level: medium
custom:
    lifecycle: experimental
    confidence: medium
    false_positive_rate: medium
    investigation_steps: |
        1. List the distinct accounts targeted from the source IP; a spray hits
           breadth, not depth (2-3 tries each).
        2. Check for ANY success from that source — a single success amid a
           spray is a live compromise, escalate immediately.
        3. Enrich the source IP; block at the edge if confirmed hostile.
    tuning_notes: |
        Threshold is distinct-accounts, not total failures — that is what
        separates a spray from single-account brute force. Corporate NAT egress
        may need an allowlist to avoid aggregating legitimate failures.
    mitre_context:
        technique: T1110.003
        tactic: Credential Access
        data_sources:
            - Logon Session: Logon Session Creation
        platforms:
            - Windows
            - SaaS
    owner: dlpz-SEC
    review_frequency: monthly
    last_reviewed: 2026-07-13
---
title: '[Auth] - Password Spray From Single Source'
id: c4a8f2d6-5b1e-4c9a-8d3f-7e2b0a6c1f9d
status: experimental
correlation:
    type: value_count
    rules:
        - 9e1c7a5b-3d2f-4b8e-a6c1-4f0d9b2e6a8c
    group-by:
        - source_ip
    timespan: 1h
    condition:
        gte: 5
        field: username
tags:
    - attack.credential_access
    - attack.t1110
    - attack.t1110.003
